plugins {
    id 'com.android.application'
}

android {
    namespace 'gltron.mobile'
    compileSdk 34

    defaultConfig {
        applicationId "gltron.org.gltronmobile"
        minSdk 24
        targetSdk 34
        versionCode 5
        versionName "5.0"

        // MonoGame native bootstrap placeholder
        ndk {
            abiFilters 'armeabi-v7a','arm64-v8a','x86','x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    // Placeholder: MonoGame Android bindings would be added here
}
